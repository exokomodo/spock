name: Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  compile:
    name: Compile (syntax check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Leiningen
        uses: ./.github/actions/setup-lein

      - name: Install dependencies
        run: make deps

      - name: Compile all profiles
        run: make check

  shaders:
    name: Compile shaders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install glslc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends glslang-tools

      - name: Compile hello shaders
        run: make shaders/hello

      - name: Compile polygon shaders
        run: make shaders/polygon
